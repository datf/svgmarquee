name: Release Binaries

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  releases-matrix:
    name: Release Go Binary
    permissions:
      contents: write
    runs-on: ubuntu-latest

    strategy:
      matrix:
        goos: [linux]
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v6
      
      - uses: actions/setup-go@v6
        with:
          go-version: '^1.26'
          go-version-file: 'go.mod'

      - name: Build binary
        run: |
          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -ldflags='-extldflags "-static"' -o svgmarquee-${{ matrix.goos }}-${{ matrix.goarch }}.fcgi -v .
        
      - name: Upload Release Asset
        uses: softprops/action-gh-release@v3
        with:
          files: svgmarquee-${{ matrix.goos }}-${{ matrix.goarch }}.fcgi
